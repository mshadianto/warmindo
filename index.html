<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Warmindo Djaya Rasa</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif; background: #050810; color: #F1F5F9; min-height: 100vh; }

    /* ── Login ── */
    .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: linear-gradient(135deg, #050810 0%, #0A1628 50%, #050810 100%); }
    .login-box { background: #111827; border: 1px solid #1E293B; border-radius: 20px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 24px 64px rgba(0,0,0,0.5); }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo-icon { font-size: 48px; margin-bottom: 8px; }
    .login-logo-title { font-size: 24px; font-weight: 800; }
    .login-logo-sub { font-size: 12px; color: #64748B; margin-top: 4px; }
    .login-field { margin-bottom: 16px; }
    .login-label { display: block; font-size: 12px; font-weight: 600; color: #94A3B8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    .login-input {
      width: 100%; height: 48px; background: #0A0F1C; border: 1px solid #2A3550; border-radius: 10px;
      padding: 0 16px; font-family: inherit; font-size: 14px; color: #F1F5F9; outline: none; transition: border-color 0.2s;
    }
    .login-input:focus { border-color: #F97316; }
    .login-input::placeholder { color: #4F5D78; }
    .login-btn {
      width: 100%; height: 48px; background: linear-gradient(135deg, #F97316, #EA580C); color: white; border: none;
      border-radius: 10px; font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer;
      transition: all 0.2s; box-shadow: 0 4px 16px rgba(249,115,22,0.3); margin-top: 8px;
    }
    .login-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(249,115,22,0.4); }
    .login-btn:active { transform: translateY(0); }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .login-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #EF4444; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; text-align: center; }

    /* ── Loading Screen ── */
    .load-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
    .load-logo { font-size: 56px; animation: pulse 1.5s ease infinite; }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    .load-title { font-size: 22px; font-weight: 800; }
    .load-bar { width: 280px; height: 6px; background: #1E293B; border-radius: 3px; overflow: hidden; }
    .load-fill { height: 100%; background: linear-gradient(90deg, #F97316, #22C55E); border-radius: 3px; transition: width 0.3s ease; }
    .load-text { font-size: 12px; color: #64748B; }

    /* ── Shell Layout ── */
    .shell { display: flex; min-height: 100vh; }
    .shell-sb {
      width: 220px; flex-shrink: 0; background: #0C1017; border-right: 1px solid #1A2438;
      display: flex; flex-direction: column; padding: 14px 0; position: fixed; top: 0; left: 0; bottom: 0; z-index: 200;
      overflow-y: auto;
    }
    .shell-sb::-webkit-scrollbar { width: 0; }
    .shell-logo { display: flex; align-items: center; gap: 8px; padding: 0 14px; margin-bottom: 20px; }
    .shell-logo-ic { width: 36px; height: 36px; background: linear-gradient(135deg, #F97316, #DC2626); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 4px 16px rgba(249,115,22,0.3); flex-shrink: 0; }
    .shell-logo-t { font-size: 13px; font-weight: 800; line-height: 1.2; }
    .shell-logo-s { font-size: 7px; color: #4F5D78; font-weight: 700; letter-spacing: 0.08em; }
    .shell-lbl { font-size: 7px; font-weight: 700; color: #4F5D78; text-transform: uppercase; letter-spacing: 0.1em; padding: 12px 14px 4px; }
    .shell-nav-item {
      display: flex; align-items: center; gap: 8px; padding: 9px 14px; margin: 1px 6px; border-radius: 8px;
      cursor: pointer; font-size: 12px; font-weight: 500; color: #728BA6; transition: all 0.15s; user-select: none;
    }
    .shell-nav-item:hover { background: #151D30; color: #C8D5E3; }
    .shell-nav-item.on { background: rgba(249,115,22,0.1); color: #F97316; font-weight: 700; }
    .shell-nav-em { font-size: 16px; width: 22px; text-align: center; flex-shrink: 0; }
    .shell-nav-perm { font-size: 8px; color: #3B82F6; margin-left: auto; opacity: 0.7; }
    .shell-sp { flex: 1; }
    .shell-user { padding: 12px 14px; border-top: 1px solid #1A2438; margin-top: 6px; }
    .shell-user-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .shell-avatar { width: 32px; height: 32px; background: linear-gradient(135deg, #F97316, #DC2626); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
    .shell-user-name { font-size: 12px; font-weight: 700; }
    .shell-user-role { font-size: 10px; }
    .shell-logout {
      width: 100%; height: 32px; background: none; border: 1px solid #2A3550; color: #728BA6;
      border-radius: 8px; font-family: inherit; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .shell-logout:hover { border-color: #EF4444; color: #EF4444; }
    .shell-content { margin-left: 220px; flex: 1; min-height: 100vh; }

    /* ── Hide module internal sidebars ── */
    .mod-wrap .W > nav.S,
    .mod-wrap .app > nav.sb,
    .mod-wrap .A > nav.S { display: none !important; }

    .mod-wrap .W > .M,
    .mod-wrap .app > .mn,
    .mod-wrap .app > .main,
    .mod-wrap .A > .MN { width: 100% !important; flex: 1 !important; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .shell-sb { width: 56px; }
      .shell-logo-t, .shell-logo-s, .shell-lbl, .shell-nav-item span:not(.shell-nav-em), .shell-nav-perm, .shell-user-name, .shell-user-role { display: none; }
      .shell-nav-item { justify-content: center; padding: 10px; margin: 1px 4px; }
      .shell-content { margin-left: 56px; }
      .shell-user-row { justify-content: center; }
      .shell-logout { font-size: 0; }
      .shell-logout::after { content: '↩'; font-size: 14px; }
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="warmindo-db.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    const { useState, useEffect, useCallback, useRef } = React;

    // ═══════════════════════════════════════════════════════════════
    // RBAC
    // ═══════════════════════════════════════════════════════════════

    const ROLES = {
      owner:   { name: "Owner",   color: "#F97316", bg: "rgba(249,115,22,0.15)" },
      manager: { name: "Manager", color: "#8B5CF6", bg: "rgba(139,92,246,0.15)" },
      kasir:   { name: "Kasir",   color: "#3B82F6", bg: "rgba(59,130,246,0.15)" },
      koki:    { name: "Koki",    color: "#22C55E", bg: "rgba(34,197,94,0.15)" },
      viewer:  { name: "Viewer",  color: "#64748B", bg: "rgba(100,116,139,0.15)" },
    };

    const USERS = [
      { username: "owner",    password: "owner123",    role: "owner",   fullName: "Pak Adit Drone", avatar: "A" },
      { username: "manager",  password: "manager123",  role: "manager", fullName: "Siti Aisyah",    avatar: "S" },
      { username: "kasir1",   password: "kasir123",    role: "kasir",   fullName: "Ahmad Rizki",    avatar: "A" },
      { username: "kasir2",   password: "kasir123",    role: "kasir",   fullName: "Dewi Lestari",   avatar: "D" },
      { username: "koki",     password: "dapur123",    role: "koki",    fullName: "Budi Santoso",   avatar: "B" },
      { username: "viewer",   password: "viewer123",   role: "viewer",  fullName: "Rina Wati",      avatar: "R" },
    ];

    const PERMISSIONS = {
      "pos-v3":     { owner: "full", manager: "full", kasir: "full", koki: "read",  viewer: "none" },
      "table-crm":  { owner: "full", manager: "full", kasir: "read", koki: "full",  viewer: "none" },
      "dashboard":  { owner: "full", manager: "full", kasir: "none", koki: "none",  viewer: "read" },
      "cash-mgmt":  { owner: "full", manager: "full", kasir: "none", koki: "none",  viewer: "none" },
      "djaya-rasa": { owner: "full", manager: "full", kasir: "none", koki: "none",  viewer: "read" },
      "migration":  { owner: "full", manager: "none", kasir: "none", koki: "none",  viewer: "none" },
      "user-menu":  { owner: "full", manager: "full", kasir: "none", koki: "none",  viewer: "none" },
    };

    const canAccess = (id, role) => (PERMISSIONS[id]?.[role] || "none") !== "none";
    const getPerm = (id, role) => PERMISSIONS[id]?.[role] || "none";

    const APPS = [
      { id: "pos-v3",    emoji: "🍜", title: "POS / Kasir",          file: "warmindo-pos-v3.jsx" },
      { id: "table-crm", emoji: "🪑", title: "Table + CRM",          file: "warmindo-table-crm.jsx" },
      { id: "dashboard",  emoji: "📊", title: "Dashboard",            file: "warmindo-dashboard.jsx" },
      { id: "cash-mgmt", emoji: "💼", title: "Cash Management",       file: "warmindo-cash-mgmt.jsx" },
      { id: "djaya-rasa", emoji: "🔥", title: "Analytics Qasir",      file: "warmindo-djaya-rasa-dashboard.jsx" },
      { id: "migration", emoji: "🔄", title: "Migration Tool",        file: "warmindo-migration-tool.jsx" },
      { id: "user-menu", emoji: "👥", title: "User & Menu",           file: "warmindo-user-menu-mgmt.jsx" },
    ];

    // ═══════════════════════════════════════════════════════════════
    // MODULE COMPILER
    // ═══════════════════════════════════════════════════════════════

    function compileModule(file) {
      return fetch(file)
        .then(r => { if (!r.ok) throw new Error("Gagal memuat " + file); return r.text(); })
        .then(code => {
          let processed = code
            .replace(/^import\s+.*?from\s+["']react["'];?\s*$/gm, "")
            .replace(/^export\s+default\s+/gm, "const __EXPORT__ = ");
          const preamble = "const { useState, useEffect, useCallback, useMemo, useRef, Fragment } = React;\n";
          const transformed = Babel.transform(preamble + processed, { presets: ["react"], filename: file }).code;
          const fn = new Function("React", "ReactDOM", transformed + "\nreturn __EXPORT__;");
          return fn(React, ReactDOM);
        });
    }

    // ═══════════════════════════════════════════════════════════════
    // LOGIN PAGE
    // ═══════════════════════════════════════════════════════════════

    function LoginPage({ onLogin }) {
      const [username, setUsername] = useState("");
      const [password, setPassword] = useState("");
      const [error, setError] = useState("");
      const [loading, setLoading] = useState(false);

      const handleSubmit = (e) => {
        e.preventDefault(); setError(""); setLoading(true);
        setTimeout(() => {
          const user = USERS.find(u => u.username === username.toLowerCase().trim() && u.password === password);
          if (user) onLogin(user); else setError("Username atau password salah!");
          setLoading(false);
        }, 400);
      };

      return (
        <div className="login-page">
          <div className="login-box">
            <div className="login-logo">
              <div className="login-logo-icon">🔥</div>
              <div className="login-logo-title">Warmindo Djaya Rasa</div>
              <div className="login-logo-sub">Masuk untuk melanjutkan</div>
            </div>
            {error && <div className="login-error">{error}</div>}
            <form onSubmit={handleSubmit}>
              <div className="login-field">
                <label className="login-label">Username</label>
                <input className="login-input" type="text" placeholder="Masukkan username" autoFocus
                  value={username} onChange={e => setUsername(e.target.value)} autoComplete="username" />
              </div>
              <div className="login-field">
                <label className="login-label">Password</label>
                <input className="login-input" type="password" placeholder="Masukkan password"
                  value={password} onChange={e => setPassword(e.target.value)} autoComplete="current-password" />
              </div>
              <button className="login-btn" type="submit" disabled={loading || !username || !password}>
                {loading ? "Memverifikasi..." : "Masuk"}
              </button>
            </form>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // LOADING SCREEN
    // ═══════════════════════════════════════════════════════════════

    function LoadingScreen({ progress, total }) {
      return (
        <div className="load-screen">
          <div className="load-logo">🔥</div>
          <div className="load-title">Warmindo Djaya Rasa</div>
          <div className="load-bar">
            <div className="load-fill" style={{ width: `${(progress / total) * 100}%` }} />
          </div>
          <div className="load-text">Memuat modul {progress}/{total}...</div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // UNIFIED SHELL
    // ═══════════════════════════════════════════════════════════════

    function Shell({ user, modules, onLogout }) {
      const role = ROLES[user.role];
      const available = APPS.filter(a => canAccess(a.id, user.role));

      const [active, setActive] = useState(() => {
        const hash = window.location.hash.slice(1);
        if (hash && available.find(a => a.id === hash)) return hash;
        return available[0]?.id || "pos-v3";
      });

      useEffect(() => {
        const handler = () => {
          const hash = window.location.hash.slice(1);
          if (hash && canAccess(hash, user.role)) setActive(hash);
        };
        window.addEventListener("popstate", handler);
        return () => window.removeEventListener("popstate", handler);
      }, [user.role]);

      const switchModule = (id) => {
        setActive(id);
        window.history.pushState({}, "", "#" + id);
      };

      const ActiveComp = modules[active];

      return (
        <div className="shell">
          {/* ── Sidebar ── */}
          <nav className="shell-sb">
            <div className="shell-logo">
              <div className="shell-logo-ic">🔥</div>
              <div>
                <div className="shell-logo-t">Warmindo</div>
                <div className="shell-logo-s">DJAYA RASA</div>
              </div>
            </div>

            <div className="shell-lbl">Modules</div>
            {available.map(app => (
              <div key={app.id}
                className={`shell-nav-item ${active === app.id ? "on" : ""}`}
                onClick={() => switchModule(app.id)}>
                <span className="shell-nav-em">{app.emoji}</span>
                <span>{app.title}</span>
                {getPerm(app.id, user.role) === "read" && <span className="shell-nav-perm">view</span>}
              </div>
            ))}

            <div className="shell-sp" />

            <div className="shell-user">
              <div className="shell-user-row">
                <div className="shell-avatar">{user.avatar}</div>
                <div>
                  <div className="shell-user-name">{user.fullName}</div>
                  <div className="shell-user-role" style={{ color: role.color }}>{role.name}</div>
                </div>
              </div>
              <button className="shell-logout" onClick={onLogout}>Logout</button>
              <div style={{ marginTop: 10, paddingTop: 8, borderTop: "1px solid #1A2438", fontSize: 8, color: "#4F5D78", lineHeight: 1.6 }}>
                Owner: Pak Adit Drone<br/>
                Dev: MS Hadianto<br/>
                warmindodjayarasa.biz.id
              </div>
            </div>
          </nav>

          {/* ── Module Content ── */}
          <div className="shell-content mod-wrap">
            {ActiveComp ? <ActiveComp /> : (
              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", color: "#64748B" }}>
                Modul tidak tersedia
              </div>
            )}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // MAIN APP
    // ═══════════════════════════════════════════════════════════════

    function App() {
      const [user, setUser] = useState(() => {
        try { const s = sessionStorage.getItem("warmindo_session"); return s ? JSON.parse(s) : null; } catch { return null; }
      });
      const [modules, setModules] = useState(null);
      const [loadProgress, setLoadProgress] = useState(0);

      useEffect(() => {
        if (user) sessionStorage.setItem("warmindo_session", JSON.stringify(user));
        else sessionStorage.removeItem("warmindo_session");
      }, [user]);

      // Preload all modules after login
      useEffect(() => {
        if (!user || modules) return;
        const map = {};
        let done = 0;
        Promise.all(APPS.map(app =>
          compileModule(app.file)
            .then(comp => { map[app.id] = comp; done++; setLoadProgress(done); })
            .catch(err => { console.error("Failed to compile " + app.file, err); done++; setLoadProgress(done); })
        )).then(() => setModules(map));
      }, [user]);

      const handleLogout = () => {
        setUser(null); setModules(null); setLoadProgress(0);
        sessionStorage.removeItem("warmindo_session");
        window.history.pushState({}, "", window.location.pathname);
      };

      if (!user) return <LoginPage onLogin={setUser} />;
      if (!modules) return <LoadingScreen progress={loadProgress} total={APPS.length} />;
      return <Shell user={user} modules={modules} onLogout={handleLogout} />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
